name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test validator
        run: pnpm --filter @hardmachinelabs/index-ai-validator test

      - name: Check validator
        run: pnpm --filter @hardmachinelabs/index-ai-validator check

      - name: Build validator
        run: pnpm --filter @hardmachinelabs/index-ai-validator build

      - name: Build docs
        run: pnpm --filter docs build

      - name: Check workspace
        run: pnpm check

      - name: Build workspace
        run: pnpm build
